name: Deploy to EC2

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Production EC2
        if: github.ref_name == 'main'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/app-server

            echo "Pull latest code"
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            echo "Install dependencies"
            npm ci

            echo "Build project"
            npm run build

            echo "Restart PM2"
            npx pm2 describe tcbt-app-server > /dev/null \
              && npx pm2 restart tcbt-app-server --update-env \
              || npx pm2 start ecosystem.config.js --update-env

            echo "Save PM2 process list"
            npx pm2 save

            echo "Production deploy complete"

      - name: Deploy Testing EC2
        if: github.ref_name == 'staging'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.TEST_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.TEST_EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/app-server

            echo "Pull latest code"
            git fetch origin
            git checkout staging
            git pull --ff-only origin staging

            echo "Install dependencies"
            npm ci

            echo "Build project"
            npm run build

            echo "Restart PM2"
            npx pm2 describe tcbt-app-server > /dev/null \
              && npx pm2 restart tcbt-app-server --update-env \
              || npx pm2 start ecosystem.config.js --update-env

            echo "Save PM2 process list"
            npx pm2 save

            echo "Staging deploy complete"
