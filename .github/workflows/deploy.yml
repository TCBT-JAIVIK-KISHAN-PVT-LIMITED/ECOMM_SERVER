name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Generate Artifact Name
        id: artifact
        run: |
          echo "name=artifact_$(date +'%Y%m%d_%H%M%S').tar.gz" >> "$GITHUB_OUTPUT"

      - name: Create Deployment Package
        run: |
          tar -czf "${{ steps.artifact.outputs.name }}" \
            dist \
            package.json \
            package-lock.json \
            ecosystem.config.js \
            config

      - name: Upload Deployment Package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "${{ steps.artifact.outputs.name }}"
          target: "/home/ubuntu/app/artifacts"

      - name: Upload Deployment Scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "scripts"
          target: "/home/ubuntu/app"

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app/scripts
            chmod +x /home/ubuntu/app/scripts/*.sh
            bash /home/ubuntu/app/scripts/deploy.sh "${{ steps.artifact.outputs.name }}"

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            curl --fail http://127.0.0.1:3000/auth/health